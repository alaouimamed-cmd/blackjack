{% extends 'base.html' %}

{% block title %}{{ 'Modifier' if client else 'Ajouter' }} un Client - Facturation{% endblock %}

{% block content %}
<h2>{{ 'Modifier' if client else 'Ajouter' }} un Client</h2>

<form method="POST">
    <div class="form-group">
        <label for="nom">Nom *</label>
        <input type="text" id="nom" name="nom" value="{{ client.nom if client else '' }}" required>
    </div>
    
    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" value="{{ client.email if client else '' }}">
    </div>
    
    <div class="form-group">
        <label for="telephone">Téléphone</label>
        <input type="text" id="telephone" name="telephone" value="{{ client.telephone if client else '' }}">
    </div>
    
    <div class="form-group">
        <label for="adresse">Adresse</label>
        <textarea id="adresse" name="adresse" rows="3">{{ client.adresse if client else '' }}</textarea>
    </div>
    
    <button type="submit" class="btn">{{ 'Modifier' if client else 'Ajouter' }}</button>
    <a href="/clients" class="btn" style="background:#666;">Annuler</a>
</form>
{% endblock %}
