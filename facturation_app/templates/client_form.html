{% extends "base.html" %}

{% block title %}Ajouter un client - Facturation{% endblock %}

{% block content %}
<div class="page-header">
    <h2>Ajouter un nouveau client</h2>
</div>

<div class="card">
    <form method="POST">
        <div class="form-group">
            <label for="nom">Nom *</label>
            <input type="text" id="nom" name="nom" required>
        </div>
        
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email">
        </div>
        
        <div class="form-group">
            <label for="telephone">Téléphone</label>
            <input type="tel" id="telephone" name="telephone">
        </div>
        
        <div class="form-group">
            <label for="adresse">Adresse</label>
            <textarea id="adresse" name="adresse" rows="3"></textarea>
        </div>
        
        <button type="submit" class="btn btn-success">Enregistrer le client</button>
        <a href="{{ url_for('clients') }}" class="btn">Annuler</a>
    </form>
</div>
{% endblock %}
