{% extends 'base.html' %}

{% block title %}{{ 'Modifier' if facture else 'Créer' }} une Facture - Facturation{% endblock %}

{% block content %}
<h2>{{ 'Modifier' if facture else 'Créer' }} une Facture</h2>

<form method="POST">
    <div class="form-group">
        <label for="numero">Numéro de facture *</label>
        <input type="text" id="numero" name="numero" value="{{ facture.numero if facture else '' }}" required>
    </div>
    
    <div class="form-group">
        <label for="client_id">Client *</label>
        <select id="client_id" name="client_id" required>
            <option value="">Sélectionner un client</option>
            {% for client in clients %}
            <option value="{{ client.id }}" {% if facture and facture.client_id == client.id %}selected{% endif %}>
                {{ client.nom }}
            </option>
            {% endfor %}
        </select>
    </div>
    
    <div class="form-group">
        <label for="date_echeance">Date d'échéance</label>
        <input type="date" id="date_echeance" name="date_echeance" value="{{ facture.date_echeance.strftime('%Y-%m-%d') if facture and facture.date_echeance else '' }}">
    </div>
    
    {% if facture %}
    <div class="form-group">
        <label for="statut">Statut</label>
        <select id="statut" name="statut">
            <option value="en_attente" {% if facture.statut == 'en_attente' %}selected{% endif %}>En attente</option>
            <option value="payee" {% if facture.statut == 'payee' %}selected{% endif %}>Payée</option>
            <option value="annulee" {% if facture.statut == 'annulee' %}selected{% endif %}>Annulée</option>
        </select>
    </div>
    {% endif %}
    
    <button type="submit" class="btn">{{ 'Modifier' if facture else 'Créer' }}</button>
    <a href="/" class="btn" style="background:#666;">Annuler</a>
</form>
{% endblock %}
